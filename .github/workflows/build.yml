name: Build & Release

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Redirect dead repositories to PaperMC
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << 'EOF'
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0 https://maven.apache.org/xsd/settings-1.0.0.xsd">
            <mirrors>
              <!--
                repo.velocitypowered.com is deprecated and returns HTML pages instead of
                Maven artifacts. Mirror any undeclared external repository to PaperMC,
                which proxies all Minecraft-ecosystem dependencies.
              -->
              <mirror>
                <id>redirect-to-papermc</id>
                <mirrorOf>*,!central,!papermc,!sonatype,!sonatype-snapshots,!bsdevelopment-repo,!minecraft-libraries,!spongepowered-repo</mirrorOf>
                <url>https://repo.papermc.io/repository/maven-public/</url>
              </mirror>
            </mirrors>
          </settings>
          EOF

      - name: Build with Maven
        run: mvn package -B --no-transfer-progress

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jars
          path: |
            CommandWhitelistBukkit/target/CommandWhitelist-Bukkit-*.jar
            CommandWhitelistWaterfall/target/CommandWhitelist-Waterfall-*.jar
            CommandWhitelistVelocity/target/CommandWhitelist-Velocity-*.jar
            !**/original-*.jar

      - name: Publish release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true
          gh release create latest \
            --title "Latest Build" \
            --notes "Build from \`${COMMIT_SHA}\`: ${COMMIT_MSG}" \
            --prerelease \
            CommandWhitelistBukkit/target/CommandWhitelist-Bukkit-*.jar \
            CommandWhitelistWaterfall/target/CommandWhitelist-Waterfall-*.jar \
            CommandWhitelistVelocity/target/CommandWhitelist-Velocity-*.jar
